<!doctype html>
<html lang="id" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buat Akun — IDDS Template</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/@idds/js@latest/dist/style.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto,
          sans-serif;
      }
    </style>
  </head>
  <body class="bg-background-primary text-content-primary">
    <div class="flex min-h-screen">
      <aside
        aria-label="Navigasi utama"
        class="hidden w-60 shrink-0 border-r border-stroke-primary bg-surface-primary md:flex md:flex-col"
      >
        <div class="flex h-16 items-center gap-8 border-b border-stroke-primary px-24">
          <span class="text-xl font-bold text-primary-500">IDDS</span>
          <span class="text-sm text-content-secondary">Playground</span>
        </div>
        <nav class="flex-1 px-12 py-16" aria-label="Menu utama">
          <ul class="grid gap-4">
            <li>
              <a
                href="../dashboard/Dashboard.html"
                class="flex items-center gap-12 rounded-md px-12 py-8 text-sm font-medium text-content-secondary hover:bg-surface-secondary hover:text-content-primary"
              >
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12 12 3l9 9"/><path d="M5 10v10h14V10"/></svg>
                Dashboard
              </a>
            </li>
            <li>
              <a
                href="Formulir.html"
                aria-current="page"
                class="flex items-center gap-12 rounded-md bg-primary-50 px-12 py-8 text-sm font-medium text-primary-700"
              >
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>
                Formulir
              </a>
            </li>
            <li>
              <a
                href="../katalog-artikel/KatalogArtikel.html"
                class="flex items-center gap-12 rounded-md px-12 py-8 text-sm font-medium text-content-secondary hover:bg-surface-secondary hover:text-content-primary"
              >
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4h12a4 4 0 0 1 4 4v12H8a4 4 0 0 1-4-4Z"/><path d="M4 4v16"/></svg>
                Katalog Artikel
              </a>
            </li>
          </ul>
        </nav>
        <div class="border-t border-stroke-primary p-16 text-caption text-content-secondary">
          INA Digital Design System v1.0
        </div>
      </aside>

      <div class="flex min-w-0 flex-1 flex-col">
        <header
          class="sticky top-0 z-20 flex h-16 items-center gap-16 border-b border-stroke-primary bg-surface-primary px-16 md:px-24"
        >
          <div class="flex flex-1 items-center gap-12">
            <span class="text-lg font-bold text-primary-500">INA</span>
            <span class="hidden text-content-secondary md:inline">/ Playground</span>
          </div>
          <button
            type="button"
            class="flex items-center gap-8 rounded-md px-8 py-4 hover:bg-surface-secondary focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary-500"
            aria-label="Buka menu pengguna John Doe"
          >
            <span
              class="grid h-8 w-8 place-items-center rounded-full bg-primary-100 text-xs font-semibold text-primary-700"
              aria-hidden="true"
            >JD</span>
            <span class="hidden text-left md:block">
              <span class="block text-sm font-medium text-content-primary">John Doe</span>
              <span class="block text-xs text-content-secondary">Product Designer</span>
            </span>
          </button>
        </header>

        <main
          id="konten-utama"
          class="flex flex-1 items-start justify-center overflow-y-auto px-4 py-32 md:px-32"
        >
          <div class="w-full max-w-xl">
            <header class="mb-24 text-center">
              <h1 class="text-2xl font-semibold text-content-primary md:text-3xl">
                Buat akun Anda
              </h1>
              <p class="mt-8 text-content-secondary">
                Masukkan informasi berikut untuk membuat akun.
              </p>
            </header>

            <section
              aria-label="Formulir pendaftaran"
              class="rounded-lg border border-stroke-secondary bg-surface-primary p-24"
            >
              <form novalidate class="grid gap-16">
                <label class="grid gap-4">
                  <span class="text-sm font-medium text-content-primary">
                    Nama Lengkap<span class="text-error-500" aria-hidden="true">*</span>
                  </span>
                  <input
                    type="text"
                    autocomplete="name"
                    required
                    class="rounded-md border border-stroke-primary bg-surface-primary px-12 py-8 text-content-primary focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary-500"
                  />
                </label>

                <label class="grid gap-4">
                  <span class="text-sm font-medium text-content-primary">
                    Nomor Ponsel<span class="text-error-500" aria-hidden="true">*</span>
                  </span>
                  <div class="flex">
                    <span
                      class="inline-flex items-center rounded-l-md border border-r-0 border-stroke-primary bg-surface-secondary px-12 text-sm text-content-secondary"
                      aria-hidden="true"
                    >+62</span>
                    <input
                      type="tel"
                      autocomplete="tel"
                      placeholder="812 3456 7890"
                      required
                      class="w-full rounded-r-md border border-stroke-primary bg-surface-primary px-12 py-8 text-content-primary focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary-500"
                    />
                  </div>
                  <span class="text-caption text-content-secondary">
                    Informasi ini digunakan untuk menghubungi Anda dan tidak akan dibagikan kepada pihak lain.
                  </span>
                </label>

                <label class="grid gap-4">
                  <span class="text-sm font-medium text-content-primary">
                    Email<span class="text-error-500" aria-hidden="true">*</span>
                  </span>
                  <input
                    type="email"
                    autocomplete="email"
                    required
                    class="rounded-md border border-stroke-primary bg-surface-primary px-12 py-8 text-content-primary focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary-500"
                  />
                </label>

                <label class="grid gap-4">
                  <span class="text-sm font-medium text-content-primary">
                    Kata Sandi<span class="text-error-500" aria-hidden="true">*</span>
                  </span>
                  <input
                    type="password"
                    autocomplete="new-password"
                    required
                    class="rounded-md border border-stroke-primary bg-surface-primary px-12 py-8 text-content-primary focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary-500"
                  />
                  <span class="text-caption text-content-secondary">Minimal 8 karakter.</span>
                </label>

                <label class="grid gap-4">
                  <span class="text-sm font-medium text-content-primary">
                    Konfirmasi Kata Sandi<span class="text-error-500" aria-hidden="true">*</span>
                  </span>
                  <input
                    type="password"
                    autocomplete="new-password"
                    required
                    class="rounded-md border border-stroke-primary bg-surface-primary px-12 py-8 text-content-primary focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary-500"
                  />
                </label>

                <button
                  type="submit"
                  class="mt-8 rounded-md bg-primary-500 px-16 py-12 text-sm font-semibold text-white hover:bg-primary-600 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary-500"
                >
                  Buat Akun
                </button>
              </form>

              <div
                class="my-24 flex items-center gap-12"
                role="separator"
                aria-orientation="horizontal"
              >
                <span class="h-px flex-1 bg-stroke-secondary"></span>
                <span class="text-caption text-content-secondary">Atau</span>
                <span class="h-px flex-1 bg-stroke-secondary"></span>
              </div>

              <button
                type="button"
                class="flex w-full items-center justify-center gap-8 rounded-md border border-stroke-primary bg-surface-primary px-16 py-12 text-sm font-medium text-content-primary hover:bg-surface-secondary focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary-500"
              >
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
                Buat Akun dengan Google
              </button>
            </section>

            <p class="mt-16 text-center text-caption text-content-secondary">
              Dengan mendaftar, Anda menyetujui
              <a href="/ketentuan" class="font-medium text-primary-700 hover:underline">Ketentuan</a>
              dan
              <a href="/privasi" class="font-medium text-primary-700 hover:underline">Kebijakan Privasi</a>
              kami.
            </p>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
