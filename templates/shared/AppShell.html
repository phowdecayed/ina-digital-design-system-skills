<!doctype html>
<html lang="id" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>App Shell — IDDS Template</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/@idds/js@latest/dist/style.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --font-sans: 'Inter', 'Plus Jakarta Sans', system-ui, -apple-system,
          'Segoe UI', Roboto, sans-serif;
      }
      body {
        font-family: var(--font-sans);
      }
    </style>
  </head>
  <body class="bg-background-primary text-content-primary">
    <div class="flex min-h-screen">
      <!-- Sidebar -->
      <aside
        aria-label="Navigasi utama"
        class="hidden w-60 shrink-0 border-r border-stroke-primary bg-surface-primary md:flex md:flex-col"
      >
        <div
          class="flex h-16 items-center gap-8 border-b border-stroke-primary px-24"
        >
          <span class="text-xl font-bold text-primary-500">IDDS</span>
          <span class="text-sm text-content-secondary">Playground</span>
        </div>
        <nav class="flex-1 px-12 py-16" aria-label="Menu utama">
          <ul class="grid gap-4">
            <li>
              <a
                href="#dashboard"
                aria-current="page"
                class="flex items-center gap-12 rounded-md bg-primary-50 px-12 py-8 text-sm font-medium text-primary-700"
              >
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12 12 3l9 9" /><path d="M5 10v10h14V10" /></svg>
                Dashboard
              </a>
            </li>
            <li>
              <a
                href="#formulir"
                class="flex items-center gap-12 rounded-md px-12 py-8 text-sm font-medium text-content-secondary hover:bg-surface-secondary hover:text-content-primary"
              >
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="3" width="16" height="18" rx="2" /><path d="M8 8h8M8 12h8M8 16h5" /></svg>
                Formulir
              </a>
            </li>
            <li>
              <a
                href="#artikel"
                class="flex items-center gap-12 rounded-md px-12 py-8 text-sm font-medium text-content-secondary hover:bg-surface-secondary hover:text-content-primary"
              >
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4h12a4 4 0 0 1 4 4v12H8a4 4 0 0 1-4-4Z" /><path d="M4 4v16" /></svg>
                Katalog Artikel
              </a>
            </li>
          </ul>
        </nav>
        <div class="border-t border-stroke-primary p-16 text-caption text-content-secondary">
          INA Digital Design System v1.0
        </div>
      </aside>

      <!-- Kolom kanan -->
      <div class="flex min-w-0 flex-1 flex-col">
        <!-- TopBar -->
        <header
          class="sticky top-0 z-20 flex h-16 items-center gap-16 border-b border-stroke-primary bg-surface-primary px-16 md:px-24"
        >
          <div class="flex flex-1 items-center gap-12">
            <span class="text-lg font-bold text-primary-500">INA</span>
            <span class="hidden text-content-secondary md:inline">/ Playground</span>
          </div>
          <button
            type="button"
            class="flex items-center gap-8 rounded-md px-8 py-4 hover:bg-surface-secondary focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary-500"
            aria-label="Buka menu pengguna John Doe"
          >
            <span
              class="grid h-8 w-8 place-items-center rounded-full bg-primary-100 text-xs font-semibold text-primary-700"
              aria-hidden="true"
            >JD</span>
            <span class="hidden text-left md:block">
              <span class="block text-sm font-medium text-content-primary">John Doe</span>
              <span class="block text-xs text-content-secondary">Product Designer</span>
            </span>
          </button>
        </header>

        <main
          id="konten-utama"
          class="flex-1 overflow-y-auto px-4 py-24 md:px-32 md:py-32"
        >
          <h1 class="text-2xl font-semibold text-content-primary">
            Konten Halaman
          </h1>
          <p class="mt-8 text-content-secondary">
            Ganti bagian ini dengan template Dashboard, Formulir, atau Katalog
            Artikel.
          </p>
        </main>
      </div>
    </div>
  </body>
</html>
